# TODO: customize theme for gruvebox
# Color pallete https://camo.githubusercontent.com/410b3ab80570bcd5b470a08d84f93caa5b4962ccd994ebceeb3d1f78364c2120/687474703a2f2f692e696d6775722e636f6d2f776136363678672e706e67
# vim: ft=tmux
set -g mode-style "fg=#eee8d5,bg=#404040"

set -g message-style "fg=#eee8d5,bg=#404040"
set -g message-command-style "fg=#eee8d5,bg=#404040"

set -g pane-border-style "fg=#404040"
set -g pane-active-border-style "fg=#eee8d5"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#586e75,bg=#404040"

set -g status-bg "#404040"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#404040,bg=#eee8d5,bold] #S #[fg=#eee8d5,bg=#93a1a1,nobold,nounderscore,noitalics]#[fg=#15161E,bg=#93a1a1,bold] #(whoami) #[fg=#93a1a1,bg=#404040]"
set -g status-right "#[fg=#586e75,bg=#404040,nobold,nounderscore,noitalics]#[fg=#93a1a1,bg=#586e75]#[fg=#657b83,bg=#586e75,nobold,nounderscore,noitalics]#[fg=#93a1a1,bg=#657b83]#[fg=#93a1a1,bg=#657b83,nobold,nounderscore,noitalics]#[fg=#15161E,bg=#93a1a1,bold] #h "

setw -g window-status-activity-style "underscore,fg=#839496,bg=#404040"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#839496,bg=#404040"
setw -g window-status-format '#[fg=#404040,bg=#404040]#[default] #I  #{b:pane_current_path} #[fg=#404040,bg=#404040,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#404040,bg=#eee8d5]#[fg=#b58900,bg=#eee8d5] #I #[fg=#eee8d5,bg=#b58900] #{b:pane_current_path} #[fg=#b58900,bg=#404040,nobold]'
